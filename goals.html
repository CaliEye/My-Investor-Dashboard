<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endgame | Goals & Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Track endgame goals and save future work notes.">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white font-inter">
  <header class="px-6 py-4 flex justify-between items-center border-b border-emerald-400 shadow-lg">
    <h1 class="text-3xl font-orbitron tracking-widest text-emerald-300">ENDGAME // Goals</h1>
    <nav class="space-x-5 text-sm md:text-base font-orbitron tracking-wide">
      <a href="index.html" class="hover:text-cyan-400">Dashboard</a>
      <a href="macro.html" class="hover:text-cyan-400">Macro</a>
      <a href="bots.html" class="hover:text-cyan-400">Bots</a>
      <a href="mindmap.html" class="hover:text-cyan-400">Mindmap</a>
      <a href="goals.html" class="text-emerald-300 border-b-2 border-emerald-300 pb-1">Goals</a>
      <a href="portfolio.html" class="hover:text-cyan-400">Portfolio</a>
    </nav>
  </header>

  <main class="p-6 max-w-7xl mx-auto space-y-8">
    <section class="rounded-2xl border-2 border-emerald-400 shadow-xl bg-gradient-to-br from-gray-900 via-gray-800 to-emerald-900 px-7 py-6">
      <h2 class="text-2xl font-orbitron text-emerald-200 mb-2">4-Year Endgame Goals</h2>
      <p class="text-sm text-gray-300">Track mission-critical objectives and keep a deferred-notes queue for focused execution windows.</p>
    </section>

    <section class="bg-gray-900 border border-yellow-500 rounded-xl p-5 shadow">
      <h3 class="text-lg font-orbitron text-yellow-300 mb-3">Primary Targets</h3>
      <div class="grid md:grid-cols-2 gap-3 text-sm" id="goal-list"></div>
    </section>

    <div class="grid lg:grid-cols-2 gap-6">
      <section class="bg-gray-900 border border-cyan-500 rounded-xl p-5 shadow">
        <h3 class="text-lg font-orbitron text-cyan-300 mb-3">Add Work Note</h3>
        <input id="note-title" class="w-full bg-gray-800 border border-cyan-700 rounded px-3 py-2 mb-3" placeholder="Note title">
        <textarea id="note-body" rows="4" class="w-full bg-gray-800 border border-cyan-700 rounded px-3 py-2 mb-3" placeholder="What to revisit later..."></textarea>
        <button id="save-note" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded font-semibold">Save Note</button>
      </section>

      <section class="bg-gray-900 border border-purple-500 rounded-xl p-5 shadow">
        <h3 class="text-lg font-orbitron text-purple-300 mb-3">Saved Notes Queue</h3>
        <div id="notes-list" class="space-y-2 text-sm text-gray-200"></div>
      </section>
    </div>
  </main>

  <script>
    const GOALS = [
      'Acquire and hold Bitcoin as top hard property reserve.',
      'Accumulate land and high-utility housing assets.',
      'Build passive income streams with resilient cash flow.',
      'Launch and operate at least one owned business.',
      'Maintain identity and asset protection protocols.',
      'Execute macro-first, confluence-only decisions.'
    ];

    const STORAGE_KEY = 'endgame_goal_notes_v1';

    function renderGoals() {
      document.getElementById('goal-list').innerHTML = GOALS.map((goal, idx) => `
        <div class="p-3 rounded-lg bg-gray-800 border border-yellow-700">
          <div class="font-semibold text-yellow-300">G-${idx + 1}</div>
          <div class="text-gray-200">${goal}</div>
        </div>
      `).join('');
    }

    function getNotes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function setNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function renderNotes() {
      const notes = getNotes();
      const node = document.getElementById('notes-list');
      if (!notes.length) {
        node.innerHTML = '<div class="text-gray-400">No notes saved yet.</div>';
        return;
      }

      node.innerHTML = notes.map((note, index) => `
        <div class="p-3 rounded-lg bg-gray-800 border border-purple-700">
          <div class="flex justify-between items-start gap-3">
            <div>
              <div class="font-semibold text-purple-300">${note.title}</div>
              <div class="text-xs text-gray-400">${new Date(note.createdAt).toLocaleString()}</div>
              <div class="mt-1 text-gray-200">${note.body}</div>
            </div>
            <button onclick="deleteNote(${index})" class="text-red-300 hover:text-red-200 text-xs">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function deleteNote(index) {
      const notes = getNotes();
      notes.splice(index, 1);
      setNotes(notes);
      renderNotes();
    }

    document.getElementById('save-note').addEventListener('click', () => {
      const title = document.getElementById('note-title').value.trim();
      const body = document.getElementById('note-body').value.trim();
      if (!title || !body) return;

      const notes = getNotes();
      notes.unshift({ title, body, createdAt: new Date().toISOString() });
      setNotes(notes);
      document.getElementById('note-title').value = '';
      document.getElementById('note-body').value = '';
      renderNotes();
    });

    renderGoals();
    renderNotes();
  </script>
</body>
</html>
